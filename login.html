<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WebBuilder | Ethiopia 2026</title>
    <meta name="description" content="Sign in to your WebBuilder account to manage your websites, upgrade your plan, and access premium features.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #1e1b4b, #312e81);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-container {
            background: white;
            border-radius: var(--radius-2xl);
            width: 100%;
            max-width: 440px;
            padding: 40px;
            box-shadow: var(--shadow-2xl);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .auth-logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text);
            text-decoration: none;
            display: block;
            margin-bottom: 8px;
        }
        
        .auth-logo span { color: var(--primary); }
        
        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .auth-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }
        
        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .auth-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text);
        }
        
        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            background: var(--bg-secondary);
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            margin-top: 8px;
        }
        
        .btn-submit:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(99,102,241,0.3);
        }
        
        .btn-submit:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        
        .divider span {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        
        .social-buttons {
            display: flex;
            gap: 12px;
        }
        
        .social-btn {
            flex: 1;
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            background: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text);
        }
        
        .social-btn:hover {
            background: var(--bg-secondary);
            border-color: var(--text-muted);
        }
        
        .social-btn.google:hover { border-color: #4285F4; }
        .social-btn.facebook:hover { border-color: #1877F2; }
        
        .social-btn img {
            width: 20px;
            height: 20px;
        }
        
        .auth-message {
            text-align: center;
            padding: 10px;
            border-radius: var(--radius-sm);
            margin-top: 16px;
            font-size: 0.85rem;
            display: none;
        }
        
        .auth-message.show { display: block; }
        .auth-message.success { background: var(--success-light); color: #065f46; }
        .auth-message.error { background: var(--error-light); color: #991b1b; }
        
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        .auth-footer a:hover { text-decoration: underline; }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
        }
        
        .back-link:hover { color: var(--text); }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <a href="index.html" class="auth-logo">Web<span>Builder</span></a>
            <p id="form-title">Welcome back</p>
        </div>
        
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchAuthMode('login')">Login</button>
            <button class="auth-tab" onclick="switchAuthMode('signup')">Sign Up</button>
        </div>
        
        <!-- Login Form -->
        <form class="auth-form active" id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" id="login-email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="login-password" placeholder="Enter password" required minlength="6">
            </div>
            <button type="submit" class="btn-submit" id="login-btn">Sign In</button>
            <div class="auth-message" id="login-message"></div>
        </form>
        
        <!-- Signup Form -->
        <form class="auth-form" id="signup-form" onsubmit="handleSignup(event)">
            <div class="form-group" id="name-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" id="signup-name" placeholder="Your full name" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" id="signup-email" placeholder="your@email.com" required>
            </div>
            <div class="form-group" id="phone-group">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-input" id="signup-phone" placeholder="0911123456" pattern="09[0-9]{8}">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="signup-password" placeholder="Min 6 characters" required minlength="6">
            </div>
            <div class="form-group" id="confirm-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-input" id="signup-confirm" placeholder="Repeat password" required minlength="6">
            </div>
            <button type="submit" class="btn-submit" id="signup-btn">Create Account</button>
            <div class="auth-message" id="signup-message"></div>
        </form>
        
        <!-- Social Login -->
        <div class="divider">
            <span>or continue with</span>
        </div>
        
        <div class="social-buttons">
            <button class="social-btn google" onclick="handleGoogleLogin()">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Google
            </button>
            <button class="social-btn facebook" onclick="handleFacebookLogin()">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
                Facebook
            </button>
        </div>
        
        <div class="auth-footer">
            <p>By signing up you agree to our Terms of Service</p>
        </div>
        
        <a href="index.html" class="back-link">Back to Home</a>
    </div>
    
    <script>
        let authMode = 'login';
        
        function switchAuthMode(mode) {
            authMode = mode;
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            if (mode === 'login') {
                document.querySelectorAll('.auth-tab')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
                document.getElementById('form-title').textContent = 'Welcome back';
                hideMessages();
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('signup-form').classList.add('active');
                document.getElementById('form-title').textContent = 'Create your account';
                hideMessages();
            }
        }
        
        function hideMessages() {
            document.querySelectorAll('.auth-message').forEach(m => m.classList.remove('show', 'success', 'error'));
        }
        
        function showMessage(formType, message, isError) {
            const msgEl = document.getElementById(formType + '-message');
            msgEl.textContent = message;
            msgEl.className = 'auth-message show ' + (isError ? 'error' : 'success');
        }
        
        function saveUser(userData) {
            const users = JSON.parse(localStorage.getItem('wb_users') || '[]');
            const exists = users.find(u => u.email === userData.email);
            if (exists) {
                Object.assign(exists, userData);
            } else {
                users.push(userData);
            }
            localStorage.setItem('wb_users', JSON.stringify(users));
        }
        
        function findUser(email) {
            const users = JSON.parse(localStorage.getItem('wb_users') || '[]');
            return users.find(u => u.email === email);
        }
        
        function saveSession(user) {
            localStorage.setItem('wb_current_user', JSON.stringify({
                name: user.name,
                email: user.email,
                plan: user.plan || 'free',
                loginMethod: user.loginMethod || 'email'
            }));
        }
        
        function redirectAfterLogin() {
            const redirect = new URLSearchParams(window.location.search).get('redirect') || 'dashboard.html';
            window.location.href = redirect;
        }
        
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');
            
            if (!email || !password) {
                showMessage('login', 'Please fill in all fields.', true);
                return;
            }
            
            btn.textContent = 'Signing in...';
            btn.disabled = true;
            
            setTimeout(() => {
                const user = findUser(email);
                
                if (!user) {
                    showMessage('login', 'No account found. Please sign up.', true);
                    btn.textContent = 'Sign In';
                    btn.disabled = false;
                    return;
                }
                
                if (user.password !== password && user.loginMethod === 'email') {
                    showMessage('login', 'Incorrect password.', true);
                    btn.textContent = 'Sign In';
                    btn.disabled = false;
                    return;
                }
                
                saveSession(user);
                showMessage('login', 'Welcome back, ' + user.name + '!', false);
                
                setTimeout(() => {
                    redirectAfterLogin();
                }, 800);
            }, 500);
        }
        
        function handleSignup(event) {
            event.preventDefault();
            
            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const phone = document.getElementById('signup-phone').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            const btn = document.getElementById('signup-btn');
            
            if (!name || !email || !password) {
                showMessage('signup', 'Please fill in all required fields.', true);
                return;
            }
            
            if (password !== confirm) {
                showMessage('signup', 'Passwords do not match.', true);
                return;
            }
            
            if (password.length < 6) {
                showMessage('signup', 'Password must be at least 6 characters.', true);
                return;
            }
            
            if (findUser(email)) {
                showMessage('signup', 'Account already exists. Please sign in.', true);
                return;
            }
            
            btn.textContent = 'Creating Account...';
            btn.disabled = true;
            
            const user = {
                name,
                email,
                phone,
                password,
                plan: 'free',
                loginMethod: 'email',
                createdAt: new Date().toISOString()
            };
            
            saveUser(user);
            saveSession(user);
            
            setTimeout(() => {
                btn.textContent = 'Create Account';
                btn.disabled = false;
                showMessage('signup', 'Account created! Redirecting...', false);
                
                setTimeout(() => {
                    redirectAfterLogin();
                }, 800);
            }, 500);
        }
        
        function handleGoogleLogin() {
            const googleUser = {
                name: 'Google User',
                email: 'google-user-' + Date.now() + '@gmail.com',
                plan: 'free',
                loginMethod: 'google',
                createdAt: new Date().toISOString()
            };
            
            saveUser(googleUser);
            saveSession(googleUser);
            
            showMessage('login', 'Signed in with Google! Redirecting...', false);
            
            setTimeout(() => {
                redirectAfterLogin();
            }, 1000);
        }
        
        function handleFacebookLogin() {
            const fbUser = {
                name: 'Facebook User',
                email: 'fb-user-' + Date.now() + '@facebook.com',
                plan: 'free',
                loginMethod: 'facebook',
                createdAt: new Date().toISOString()
            };
            
            saveUser(fbUser);
            saveSession(fbUser);
            
            showMessage('login', 'Signed in with Facebook! Redirecting...', false);
            
            setTimeout(() => {
                redirectAfterLogin();
            }, 1000);
        }
        
        const savedUser = JSON.parse(localStorage.getItem('wb_current_user'));
        if (savedUser && savedUser.loginMethod === 'email') {
            document.getElementById('login-email').value = savedUser.email || '';
        }
    </script>
    
</body>
</html>
