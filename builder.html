<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Builder - WebBuilder | Ethiopia 2026</title>
    <meta name="description" content="Build your professional website in minutes with our free drag-and-drop builder. No coding needed. Publish instantly.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        body {
            background: #0f172a;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .builder-topbar {
            background: #1e293b;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #334155;
            z-index: 100;
            flex-shrink: 0;
        }

        .builder-topbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .builder-logo {
            font-weight: 800;
            color: white;
            font-size: 1.1rem;
            text-decoration: none;
        }

        .builder-logo span { color: #6366f1; }

        .site-name-input {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: inherit;
        }

        .builder-btn {
            padding: 8px 18px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
        }

        .builder-btn-ghost { background: transparent; color: #cbd5e1; border: 1px solid #475569; }
        .builder-btn-ghost:hover { background: #334155; }
        .builder-btn-primary { background: #6366f1; color: white; }
        .builder-btn-primary:hover { background: #4f46e5; }
        .builder-btn-success { background: #10b981; color: white; }
        .builder-btn-success:hover { background: #059669; }

        .builder-main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .builder-sidebar {
            width: 260px;
            background: #1e293b;
            border-right: 1px solid #334155;
            overflow-y: auto;
            padding: 12px;
            flex-shrink: 0;
        }

        .sidebar-links {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #334155;
        }

        .sidebar-links a {
            display: block;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.8rem;
            padding: 6px 8px;
            border-radius: 4px;
            margin-bottom: 2px;
            transition: all 0.2s;
        }

        .sidebar-links a:hover {
            color: white;
            background: #334155;
        }

        .section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin: 16px 0 8px;
        }

        .section-label:first-of-type {
            margin-top: 0;
        }

        .block-item {
            background: #334155;
            border: 1px solid #475569;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 6px;
            cursor: grab;
            color: #e2e8f0;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            user-select: none;
        }

        .block-item:hover { background: #475569; border-color: #6366f1; }
        .block-item:active { cursor: grabbing; opacity: 0.7; }

        .block-icon {
            width: 28px;
            height: 28px;
            background: rgba(99,102,241,0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .builder-canvas-area {
            flex: 1;
            overflow-y: auto;
            background: #0f172a;
            padding: 24px;
            display: flex;
            justify-content: center;
        }

        .builder-canvas-wrapper {
            width: 100%;
            max-width: 850px;
            background: white;
            border-radius: 4px;
            min-height: 700px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .builder-canvas {
            min-height: 700px;
        }

        .builder-block {
            position: relative;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .builder-block:hover { border-color: rgba(99,102,241,0.4); }

        .builder-block.selected {
            border-color: #6366f1 !important;
            outline: 2px solid #6366f1;
            outline-offset: -2px;
        }

        .builder-block.drag-over {
            border-color: #10b981 !important;
            background: rgba(16,185,129,0.03);
        }

        .block-toolbar {
            position: absolute;
            top: -36px;
            right: 0;
            display: none;
            gap: 4px;
            z-index: 10;
        }

        .builder-block.selected .block-toolbar,
        .builder-block:hover .block-toolbar { display: flex; }

        .block-tool-btn {
            width: auto;
            height: 28px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 700;
            background: white;
            color: #1e293b;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 8px;
            white-space: nowrap;
        }

        .block-tool-btn:hover { transform: scale(1.05); }
        .block-tool-btn.delete:hover { background: #ef4444; color: white; }
        .block-tool-btn.edit:hover { background: #6366f1; color: white; }
        .block-tool-btn.move:hover { background: #10b981; color: white; }

        .empty-canvas {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 400px;
            color: #94a3b8;
            text-align: center;
            font-family: 'Inter', sans-serif;
        }

        .empty-canvas .big-icon {
            font-size: 4rem;
            margin-bottom: 12px;
        }

        .empty-canvas h3 {
            color: #64748b;
            margin-bottom: 8px;
        }

        .empty-canvas p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .builder-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #10b981;
            color: white;
            padding: 14px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            z-index: 9999;
            display: none;
            animation: slideIn 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .builder-toast.show { display: block; }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="builder-topbar">
        <div class="builder-topbar-left">
            <a href="/web/index.html" class="builder-logo">Web<span>Builder</span></a>
            <input type="text" class="site-name-input" id="site-name" value="my-business" placeholder="Site name">
        </div>
        <div style="display:flex; gap:8px;">
            <button class="builder-btn builder-btn-ghost" onclick="Builder.preview()">Preview</button>
            <button class="builder-btn builder-btn-ghost" onclick="Builder.save()">Save</button>
            <button class="builder-btn builder-btn-success" onclick="Builder.publish()">Publish</button>
        </div>
    </div>

    <div class="builder-main">

        <div class="builder-sidebar">
            <div class="sidebar-links">
                <a href="/web/templates.html">Templates</a>
                <a href="/web/dashboard.html">My Sites</a>
                <a href="/web/index.html">Home</a>
            </div>

            <div class="section-label">Layout</div>
            <div class="block-item" draggable="true" data-type="hero" ondragstart="Builder.dragStart(event)">
                <div class="block-icon">H</div> Hero Section
            </div>
            <div class="block-item" draggable="true" data-type="features" ondragstart="Builder.dragStart(event)">
                <div class="block-icon">F</div> Features Grid
            </div>

            <div class="section-label">Content</div>
            <div class="block-item" draggable="true" data-type="heading" ondragstart="Builder.dragStart(event)">
                <div class="block-icon">T</div> Heading
            </div>
            <div class="block-item" draggable="true" data-type="text" ondragstart="Builder.dragStart(event)">
                <div class="block-icon">P</div> Text Block
            </div>
            <div class="block-item" draggable="true" data-type="image" ondragstart="Builder.dragStart(event)">
                <div class="block-icon">I</div> Image
            </div>
            <div class="block-item" draggable="true" data-type="button" ondragstart="Builder.dragStart(event)">
                <div class="block-icon">B</div> Button
            </div>

            <div class="section-label">Business</div>
            <div class="block-item" draggable="true" data-type="contact" ondragstart="Builder.dragStart(event)">
                <div class="block-icon">C</div> Contact Form
            </div>
            <div class="block-item" draggable="true" data-type="pricing" ondragstart="Builder.dragStart(event)">
                <div class="block-icon">$</div> Pricing Table
            </div>
            <div class="block-item" draggable="true" data-type="testimonials" ondragstart="Builder.dragStart(event)">
                <div class="block-icon">R</div> Testimonials
            </div>

            <div class="section-label">Media</div>
            <div class="block-item" draggable="true" data-type="youtube" ondragstart="Builder.dragStart(event)">
                <div class="block-icon">Y</div> YouTube Video
            </div>
            <div class="block-item" draggable="true" data-type="social" ondragstart="Builder.dragStart(event)">
                <div class="block-icon">S</div> Social Links
            </div>
        </div>

        <div class="builder-canvas-area" ondragover="event.preventDefault()" ondrop="Builder.drop(event)">
            <div class="builder-canvas-wrapper">
                <div class="builder-canvas" id="builder-canvas">
                    <div class="empty-canvas" id="empty-state">
                        <div class="big-icon">+</div>
                        <h3>Start Building Your Website</h3>
                        <p>Drag blocks from the left panel here</p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="builder-toast" id="builder-toast"></div>

    <script>
        const Builder = {
            selectedBlock: null,
            blocks: {},
            canvas: null,
            emptyState: null,
            siteNameInput: null,

            init() {
                this.canvas = document.getElementById('builder-canvas');
                this.emptyState = document.getElementById('empty-state');
                this.siteNameInput = document.getElementById('site-name');
                
                this.defineBlocks();
                
                const templateId = new URLSearchParams(window.location.search).get('template');
                if (templateId) {
                    setTimeout(() => {
                        this.loadTemplate(templateId);
                    }, 100);
                } else {
                    this.loadSite();
                }
                
                this.setupCanvasClick();
            },

            defineBlocks() {
                this.blocks = {
                    hero: `<div style="text-align:center;padding:60px 20px;background:#f8fafc;font-family:'Inter',sans-serif;">
                        <h1 style="font-size:2rem;font-weight:800;color:#1e293b;margin-bottom:12px;">Welcome to My Business</h1>
                        <p style="font-size:1.1rem;color:#64748b;margin-bottom:20px;">We provide the best services for our customers.</p>
                        <a href="#" style="display:inline-block;padding:14px 30px;background:#6366f1;color:white;border-radius:8px;font-weight:600;text-decoration:none;">Get Started</a>
                    </div>`,
                    features: `<div style="padding:40px 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;font-family:'Inter',sans-serif;">
                        <div style="text-align:center;padding:20px;background:#f8fafc;border-radius:10px;"><h4 style="margin-bottom:4px;">Fast</h4><p style="color:#64748b;font-size:0.85rem;">Quick delivery</p></div>
                        <div style="text-align:center;padding:20px;background:#f8fafc;border-radius:10px;"><h4 style="margin-bottom:4px;">Quality</h4><p style="color:#64748b;font-size:0.85rem;">Best service</p></div>
                        <div style="text-align:center;padding:20px;background:#f8fafc;border-radius:10px;"><h4 style="margin-bottom:4px;">Support</h4><p style="color:#64748b;font-size:0.85rem;">24/7 help</p></div>
                    </div>`,
                    heading: `<div style="padding:20px;text-align:center;"><h2 style="font-size:1.8rem;font-weight:700;color:#1e293b;">Section Heading</h2></div>`,
                    text: `<div style="padding:15px 20px;"><p style="color:#64748b;line-height:1.7;">Edit this text to describe your business, services, or anything you want to share with your customers.</p></div>`,
                    image: `<div style="padding:20px;text-align:center;background:#f8fafc;border:2px dashed #cbd5e1;border-radius:12px;cursor:pointer;" onclick="Builder.openImagePicker(this)"><div style="font-size:3rem;">+</div><p style="color:#64748b;">Click to add image</p></div>`,
                    button: `<div style="text-align:center;padding:20px;"><a href="#" style="display:inline-block;padding:14px 30px;background:#6366f1;color:white;border-radius:8px;font-weight:600;text-decoration:none;">Click Here</a></div>`,
                    contact: `<div style="padding:40px 20px;max-width:450px;margin:0 auto;font-family:'Inter',sans-serif;"><h2 style="text-align:center;margin-bottom:20px;">Contact Us</h2><form onsubmit="event.preventDefault();alert('Message sent!');" style="display:flex;flex-direction:column;gap:10px;"><input placeholder="Name" style="padding:10px;border:1px solid #e2e8f0;border-radius:6px;"><input placeholder="Email" style="padding:10px;border:1px solid #e2e8f0;border-radius:6px;"><textarea placeholder="Message" rows="3" style="padding:10px;border:1px solid #e2e8f0;border-radius:6px;"></textarea><button type="submit" style="padding:12px;background:#6366f1;color:white;border:none;border-radius:6px;cursor:pointer;">Send</button></form></div>`,
                    pricing: `<div style="padding:30px 20px;font-family:'Inter',sans-serif;"><h2 style="text-align:center;margin-bottom:20px;">Our Pricing</h2><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:700px;margin:0 auto;"><div style="text-align:center;padding:20px;border:1px solid #e2e8f0;border-radius:10px;"><h4>Basic</h4><p style="font-size:1.5rem;font-weight:700;color:#6366f1;">Br 500</p></div><div style="text-align:center;padding:20px;border:2px solid #6366f1;border-radius:10px;background:#eef2ff;"><h4>Pro</h4><p style="font-size:1.5rem;font-weight:700;color:#6366f1;">Br 1,500</p></div><div style="text-align:center;padding:20px;border:1px solid #e2e8f0;border-radius:10px;"><h4>Enterprise</h4><p style="font-size:1.5rem;font-weight:700;color:#6366f1;">Custom</p></div></div></div>`,
                    testimonials: `<div style="padding:30px 20px;background:#f8fafc;font-family:'Inter',sans-serif;"><h2 style="text-align:center;margin-bottom:20px;">Testimonials</h2><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;"><div style="background:white;padding:16px;border-radius:10px;"><p style="color:#64748b;font-size:0.85rem;">"Amazing service!"</p><strong style="font-size:0.8rem;">Abebe K.</strong></div><div style="background:white;padding:16px;border-radius:10px;"><p style="color:#64748b;font-size:0.85rem;">"Best in Ethiopia!"</p><strong style="font-size:0.8rem;">Tigist M.</strong></div><div style="background:white;padding:16px;border-radius:10px;"><p style="color:#64748b;font-size:0.85rem;">"Professional work."</p><strong style="font-size:0.8rem;">Dawit G.</strong></div></div></div>`,
                    youtube: `<div style="padding:20px;max-width:700px;margin:0 auto;"><div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allowfullscreen></iframe></div></div>`,
                    social: `<div style="padding:20px;text-align:center;display:flex;justify-content:center;gap:16px;flex-wrap:wrap;"><a href="https://facebook.com" target="_blank" style="width:44px;height:44px;background:#1877F2;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;font-weight:700;font-size:0.8rem;">FB</a><a href="https://instagram.com" target="_blank" style="width:44px;height:44px;background:#E4405F;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;font-weight:700;font-size:0.8rem;">IG</a><a href="https://t.me" target="_blank" style="width:44px;height:44px;background:#26A5E4;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;font-weight:700;font-size:0.8rem;">TG</a></div>`
                };
            },

            dragStart(e) {
                e.dataTransfer.setData('text/plain', e.target.closest('.block-item').dataset.type);
            },

            drop(e) {
                e.preventDefault();
                const blockType = e.dataTransfer.getData('text/plain');
                if (blockType && this.blocks[blockType]) {
                    this.addBlock(blockType);
                }
            },

            addBlock(type) {
                if (this.emptyState) this.emptyState.style.display = 'none';
                
                const wrapper = document.createElement('div');
                wrapper.className = 'builder-block';
                wrapper.dataset.type = type;
                wrapper.innerHTML = this.blocks[type];
                
                const toolbar = document.createElement('div');
                toolbar.className = 'block-toolbar';
                toolbar.innerHTML = `
                    <button class="block-tool-btn edit" onclick="event.stopPropagation();Builder.editBlock(this.closest('.builder-block'))">Edit</button>
                    <button class="block-tool-btn move" onclick="event.stopPropagation();Builder.moveBlock(this.closest('.builder-block'),'up')">Up</button>
                    <button class="block-tool-btn move" onclick="event.stopPropagation();Builder.moveBlock(this.closest('.builder-block'),'down')">Down</button>
                    <button class="block-tool-btn delete" onclick="event.stopPropagation();Builder.deleteBlock(this.closest('.builder-block'))">Delete</button>
                `;
                wrapper.appendChild(toolbar);
                
                wrapper.addEventListener('click', function(e) {
                    e.stopPropagation();
                    Builder.selectBlock(this);
                });
                
                this.canvas.appendChild(wrapper);
                this.selectBlock(wrapper);
                this.showToast('Block added. Click Edit to change text.');
            },

            selectBlock(block) {
                document.querySelectorAll('.builder-block.selected').forEach(b => b.classList.remove('selected'));
                block.classList.add('selected');
                this.selectedBlock = block;
            },

            deleteBlock(block) {
                if (confirm('Remove this block?')) {
                    block.style.opacity = '0';
                    block.style.transform = 'scale(0.95)';
                    block.style.transition = 'all 0.3s';
                    setTimeout(() => {
                        block.remove();
                        if (this.canvas.querySelectorAll('.builder-block').length === 0) {
                            if (this.emptyState) this.emptyState.style.display = 'flex';
                        }
                    }, 300);
                    this.showToast('Block removed');
                }
            },

            moveBlock(block, direction) {
                const sibling = direction === 'up' ? block.previousElementSibling : block.nextElementSibling;
                if (sibling && sibling.classList.contains('builder-block')) {
                    direction === 'up' ? this.canvas.insertBefore(block, sibling) : this.canvas.insertBefore(sibling, block);
                    this.showToast('Block moved');
                }
            },

            editBlock(block) {
                this.selectBlock(block);
                
                if (block.dataset.type === 'youtube') {
                    const iframe = block.querySelector('iframe');
                    const newUrl = prompt('Enter YouTube video URL:', iframe?.src);
                    if (newUrl && iframe) {
                        let videoId = newUrl;
                        if (newUrl.includes('v=')) videoId = newUrl.split('v=')[1].split('&')[0];
                        else if (newUrl.includes('youtu.be/')) videoId = newUrl.split('youtu.be/')[1].split('?')[0];
                        else if (newUrl.includes('embed/')) videoId = newUrl.split('embed/')[1].split('?')[0];
                        iframe.src = 'https://www.youtube.com/embed/' + videoId;
                    }
                    return;
                }
                
                if (block.dataset.type === 'social') {
                    const links = block.querySelectorAll('a');
                    const platforms = ['Facebook', 'Instagram', 'Telegram'];
                    links.forEach((link, index) => {
                        const newUrl = prompt(platforms[index] + ' URL:', link.href);
                        if (newUrl) link.href = newUrl;
                    });
                    return;
                }
                
                const editables = block.querySelectorAll('h1, h2, h3, h4, p, a');
                editables.forEach(el => {
                    el.contentEditable = 'true';
                    el.style.outline = '1px dashed #6366f1';
                    el.focus();
                    el.addEventListener('blur', function() {
                        this.contentEditable = 'false';
                        this.style.outline = 'none';
                    }, { once: true });
                });
                this.showToast('Click text to edit. Click away when done.');
            },

            setupCanvasClick() {
                this.canvas.addEventListener('click', function(e) {
                    if (e.target === this) {
                        document.querySelectorAll('.builder-block.selected').forEach(b => b.classList.remove('selected'));
                        Builder.selectedBlock = null;
                    }
                });
            },

            openImagePicker(container) {
                window.selectedImageContainer = container;
                window.open('/web/image-picker.html', 'ImagePicker', 'width=800,height=600');
            },

            insertImage(url) {
                if (window.selectedImageContainer) {
                    window.selectedImageContainer.innerHTML = `<div style="padding:20px;text-align:center;"><img src="${url}" style="max-width:100%;border-radius:8px;" alt="Image"></div>`;
                    window.selectedImageContainer = null;
                    this.showToast('Image added');
                }
            },

            save() {
                const siteName = this.siteNameInput?.value || 'my-site';
                localStorage.setItem('wb_site_' + siteName, this.canvas.innerHTML);
                this.showToast('Site saved');
            },

            loadSite() {
                const siteName = this.siteNameInput?.value || 'my-site';
                const content = localStorage.getItem('wb_site_' + siteName);
                if (content) {
                    this.canvas.innerHTML = content;
                    if (this.emptyState) this.emptyState.style.display = 'none';
                    this.canvas.querySelectorAll('.builder-block').forEach(block => {
                        block.addEventListener('click', function(e) {
                            e.stopPropagation();
                            Builder.selectBlock(this);
                        });
                    });
                }
            },

            loadTemplate(templateId) {
                const templateData = JSON.parse(localStorage.getItem('wb_selected_template'));
                
                if (!templateData) {
                    this.showToast('No template selected. Starting blank canvas.');
                    return;
                }
                
                if (this.emptyState) this.emptyState.style.display = 'none';
                
                if (templateData.blocks && templateData.blocks.length > 0) {
                    templateData.blocks.forEach(blockType => {
                        if (this.blocks[blockType]) {
                            this.addBlock(blockType);
                        }
                    });
                    
                    if (this.siteNameInput && templateData.name) {
                        this.siteNameInput.value = templateData.name.replace(/\s+/g, '-').toLowerCase();
                    }
                    
                    this.showToast('Template loaded. Customize it your way.');
                } else {
                    this.showToast('Template has no blocks. Start building.');
                }
                
                localStorage.removeItem('wb_selected_template');
            },

            preview() {
                this.save();
                const siteName = this.siteNameInput?.value || 'my-site';
                const content = this.canvas.innerHTML;
                const win = window.open('', '_blank');
                win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>${siteName}</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Inter',sans-serif;}</style></head><body>${content.replace(/<div class="block-toolbar".*?<\/div>/g, '')}</body></html>`);
            },

            publish() {
                this.save();
                const siteName = this.siteNameInput?.value || 'my-site';
                window.location.href = '/web/publish.html?site=' + encodeURIComponent(siteName);
            },

            showToast(message) {
                const toast = document.getElementById('builder-toast');
                toast.textContent = message;
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
            }
        };

        document.addEventListener('DOMContentLoaded', () => Builder.init());
    </script>

</body>
</html>
